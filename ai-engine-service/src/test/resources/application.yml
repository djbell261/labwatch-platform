spring:
  datasource:
    url: jdbc:h2:mem:aiengine;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ai-engine-test-group
    listener:
      auto-startup: false

logging:
  level:
    root: WARN

app:
  kafka:
    topic:
      auto-create-enabled: false
      health-events: health-events
      anomaly-events: anomaly-events
