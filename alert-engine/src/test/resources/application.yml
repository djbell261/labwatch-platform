spring:
  datasource:
    url: jdbc:h2:mem:alertengine;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: alert-engine-test-group
    listener:
      auto-startup: false

logging:
  level:
    root: WARN

app:
  kafka:
    topic:
      health-events: health-events
