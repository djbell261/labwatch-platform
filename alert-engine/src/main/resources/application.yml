server:
  port: 8088

spring:
  application:
    name: alert-engine

  datasource:
    url: jdbc:postgresql://localhost:5433/labwatch
    username: postgres
    password: Noah2511
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: alert-engine-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring:
          json:
            trusted:
              packages: "*"
            use:
              type:
                headers: false
            value:
              default:
                type: com.example.alertengine.dto.HealthEventMessage

logging:
  level:
    root: INFO
    org.springframework: INFO

app:
  kafka:
    topic:
      health-events: health-events